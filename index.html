<div class="bounce-cards-section">

    </div>

</div>


<script>
  // Bounce Cards — fanned stack with hover effect
  const cards = [
    { id: "bc1", x: -180, rotate: -18 },
    { id: "bc2", x: -90,  rotate: -9  },
    { id: "bc3", x: 0,    rotate: 0   },
    { id: "bc4", x: 90,   rotate: 9   },
    { id: "bc5", x: 180,  rotate: 18  },
  ];

  // Entrance animation — staggered bounce in
  cards.forEach((c, i) => {
    gsap.fromTo(`#${c.id}`,
      { x: 0, y: 60, rotate: 0, opacity: 0, scale: 0.8 },
      {
        x: c.x,
        rotate: c.rotate,
        y: 0,
        opacity: 1,
        scale: 1,
        duration: 0.7,
        delay: 1 + i * 0.08,
        ease: "back.out(1.8)"
      }
    );
  });

  // Hover: fan out toward hovered card
  cards.forEach((c, i) => {
    const el = document.getElementById(c.id);

    el.addEventListener("mouseenter", () => {
      cards.forEach((other, j) => {
        const spread = j < i ? -20 : j > i ? 20 : 0;
        gsap.to(`#${other.id}`, {
          x: other.x + spread,
          scale: j === i ? 1.12 : 1,
          zIndex: j === i ? 10 : 1,
          duration: 0.35,
          ease: "back.out(2)"
        });
      });
    });

    el.addEventListener("mouseleave", () => {
      cards.forEach((other) => {
        gsap.to(`#${other.id}`, {
          x: other.x,
          scale: 1,
          zIndex: 1,
          duration: 0.35,
          ease: "back.out(2)"
        });
      });
    });
  });
</script>
